name: Inspect Apps

on:
  schedule:
    # 每周一 UTC 03:00（北京时间 11:00）
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: inspect-apps
  cancel-in-progress: true

jobs:
  inspect:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Download electron-map.json
        run: |
          curl -fsSL -o electron-map.json \
            https://raw.githubusercontent.com/Fz0x00/chromiumHunter/main/electron-map.json

      - name: Build hunter
        run: go build -o hunter .

      - name: Inspect registered apps
        run: |
          ./hunter inspect-list \
            -json inspect-results.json \
            -electron-map electron-map.json \
            -timeout 10m \
            apps.json 2>&1

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: inspect-results
          path: inspect-results.json
