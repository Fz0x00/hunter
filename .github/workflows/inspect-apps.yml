name: Inspect Apps

on:
  schedule:
    # 每周一 UTC 03:00（北京时间 11:00）
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: inspect-apps
  cancel-in-progress: true

jobs:
  inspect:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Download electron-map.json
        run: |
          curl -fsSL -o electron-map.json \
            https://raw.githubusercontent.com/Fz0x00/chromiumHunter/main/electron-map.json
          echo "[fetch] electron-map.json:"
          cat electron-map.json | head -20

      - name: Build hunter
        run: go build -o hunter .

      - name: Inspect registered apps
        run: |
          echo "[inspect] downloading & inspecting apps from apps.json..."
          ./hunter inspect-list apps.json \
            -json inspect-results.json \
            -electron-map electron-map.json \
            -timeout 10m 2>&1

      - name: Generate dashboard HTML
        run: |
          mkdir -p docs
          cat > docs/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>ChromiumHunter - App Inspection Results</title>
            <style>
              body { font-family: -apple-system, sans-serif; margin: 2em; }
              h1 { color: #333; }
              table { border-collapse: collapse; width: 100%; }
              th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
              th { background: #f4f4f4; }
              .chromium-old { color: #c00; font-weight: bold; }
              .chromium-ok { color: #080; }
            </style>
          </head>
          <body>
            <h1>ChromiumHunter Inspection Results</h1>
            <p>Generated: <span id="time"></span></p>
            <p>See raw JSON in <a href="../inspect-results.json">inspect-results.json</a></p>
            <div id="results">Loading...</div>
            <script>
              fetch('../inspect-results.json')
                .then(r => r.json())
                .then(data => {
                  document.getElementById('time').textContent = data.scan_time || '';
                  const apps = data.apps || [];
                  const html = '<table><tr><th>App</th><th>Framework</th><th>Chromium</th><th>Electron</th></tr>' +
                    apps.map(a => {
                      const chrome = a.chromium_version || '?';
                      const cls = chrome.startsWith('1') && parseInt(chrome) < 130 ? 'chromium-old' : 'chromium-ok';
                      return `<tr><td>${a.app_name||''}</td><td>${a.framework||''}</td>` +
                        `<td class="${cls}">${chrome}</td><td>${a.electron_version||'-'}</td></tr>`;
                    }).join('') + '</table>';
                  document.getElementById('results').innerHTML = html;
                });
            </script>
          </body>
          </html>
          HTMLEOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results
          path: |
            inspect-results.json
            docs/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          artifact_name: results
