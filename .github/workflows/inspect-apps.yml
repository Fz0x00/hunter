name: Inspect Apps

on:
  schedule:
    # 每周一 UTC 03:00（北京时间 11:00）
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      only:
        description: 'Comma-separated app names to inspect (empty = all)'
        required: false
        default: ''
        type: string

permissions:
  contents: read

concurrency:
  group: inspect-apps
  cancel-in-progress: true

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install 7zip and xz (for DMG/archive extraction)
        run: sudo apt-get update && sudo apt-get install -y p7zip-full xz-utils

      - name: Build hunter
        run: go build -o hunter .

      - name: Inspect registered apps
        env:
          ONLY: ${{ github.event.inputs.only }}
        run: |
          ARGS=(-db hunter.db -json inspect-results.json -electron-map electron-map.json -timeout 10m -concurrency 5)
          if [ -n "$ONLY" ]; then
            ARGS+=(-only "$ONLY")
          fi
          ./hunter inspect-list "${ARGS[@]}" apps.json 2>&1

      - name: Show database stats
        run: ./hunter query -db hunter.db -stats 2>&1

      - name: Find vulnerable apps (Chromium <= 130)
        run: ./hunter query -db hunter.db -old 130 2>&1

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: inspect-results
          path: |
            inspect-results.json
            hunter.db
