name: Inspect Apps

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      apps_json:
        description: 'Path to apps.json (default: apps.json)'
        required: false
        default: 'apps.json'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: inspect-apps
  cancel-in-progress: true

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install 7zip (for DMG extraction)
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Build hunter
        working-directory: hunter
        run: |
          go build -o hunter .
          chmod +x hunter

      - name: Fetch electron-map.json
        working-directory: hunter
        run: |
          if [ ! -f ../electron-map.json ]; then
            echo "electron-map.json not found, generating minimal version"
          fi

      - name: Run inspect-list
        working-directory: hunter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APPS="${{ inputs.apps_json || 'apps.json' }}"
          ./hunter inspect-list "$APPS" \
            -electron-map ../electron-map.json \
            -json data/inspect-results.json \
            -timeout 10m

      - name: Generate timestamped snapshot
        working-directory: hunter
        run: |
          mkdir -p data
          TIMESTAMP=$(date -u +%Y-%m-%d)
          cp data/inspect-results.json "data/inspect-${TIMESTAMP}.json"

      - name: Build dashboard HTML
        working-directory: hunter
        run: |
          cat > data/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>ChromiumHunter — App Chromium Version Tracker</title>
          <style>
          * { margin: 0; padding: 0; box-sizing: border-box; }
          body { font-family: -apple-system, 'SF Mono', monospace; background: #0d1117; color: #c9d1d9; padding: 24px; }
          h1 { font-size: 20px; margin-bottom: 4px; }
          .meta { color: #8b949e; font-size: 13px; margin-bottom: 24px; }
          .summary { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
          .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px 20px; min-width: 120px; }
          .card .label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
          .card .value { font-size: 24px; font-weight: 700; margin-top: 4px; }
          .card.red .value { color: #f85149; }
          .card.orange .value { color: #d29922; }
          .card.green .value { color: #3fb950; }
          .card.blue .value { color: #58a6ff; }
          table { width: 100%; border-collapse: collapse; background: #161b22; border-radius: 8px; overflow: hidden; }
          th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #21262d; font-size: 13px; }
          th { background: #1c2128; font-weight: 600; color: #8b949e; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
          td.ver { font-family: 'SF Mono', monospace; }
          .gap { color: #f85149; font-weight: 600; }
          .ok { color: #3fb950; }
          .warn { color: #d29922; }
          .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
          .badge.red { background: rgba(248,81,73,0.15); color: #f85149; }
          .badge.orange { background: rgba(210,153,34,0.15); color: #d29922; }
          .badge.green { background: rgba(63,185,80,0.15); color: #3fb950; }
          .badge.blue { background: rgba(88,166,255,0.15); color: #58a6ff; }
          input { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 8px 12px; color: #c9d1d9; font-size: 13px; width: 300px; margin-bottom: 16px; }
          </style>
          </head>
          <body>
          <h1>ChromiumHunter — App Chromium Version Tracker</h1>
          <div class="meta" id="meta">Loading...</div>
          <div class="summary" id="summary"></div>
          <input type="text" id="search" placeholder="Search apps..." oninput="filter()">
          <table id="table">
            <thead><tr><th>App</th><th>Publisher</th><th>Framework</th><th>Chromium</th><th>Age</th><th>Risk</th><th>Method</th></tr></thead>
            <tbody id="tbody"></tbody>
          </table>
          <script>
          let apps = [];
          let latestChrome = 0;
          fetch('inspect-results.json').then(r=>r.json()).then(d=>{
            apps = d.apps||[];
            apps.forEach(a=>{
              a.major = parseInt((a.chromium_version||'0.0').split('.')[0])||0;
            });
            latestChrome = Math.max(...apps.map(a=>a.major), 0);
            render();
          }).catch(()=>{ document.getElementById('meta').textContent='Failed to load data'; });

          function riskLevel(a) {
            if (!a.chromium_version) return {cls:'blue',text:'Unknown'};
            const gap = latestChrome - a.major;
            if (gap > 20) return {cls:'red',text:'CRITICAL ('+gap+' majors behind)'};
            if (gap > 10) return {cls:'red',text:'HIGH ('+gap+' behind)'};
            if (gap > 4) return {cls:'orange',text:'MEDIUM ('+gap+' behind)'};
            if (gap > 1) return {cls:'green',text:'LOW ('+gap+' behind)'};
            return {cls:'green',text:'OK'};
          }

          function render() {
            const d = new Date().toISOString().slice(0,10);
            document.getElementById('meta').textContent = `${apps.length} apps scanned | Latest Chromium detected: v${latestChrome} | ${d}`;
            const crit = apps.filter(a=>latestChrome-(a.major||0)>10).length;
            const ok = apps.filter(a=>latestChrome-(a.major||0)<=4).length;
            document.getElementById('summary').innerHTML = `
              <div class="card blue"><div class="label">Total Apps</div><div class="value">${apps.length}</div></div>
              <div class="card"><div class="label">Latest Chrome</div><div class="value">v${latestChrome}</div></div>
              <div class="card red"><div class="label">High Risk</div><div class="value">${crit}</div></div>
              <div class="card green"><div class="label">Up to Date</div><div class="value">${ok}</div></div>
            `;
            const tbody = document.getElementById('tbody');
            tbody.innerHTML = apps.map(a=>{
              const r = riskLevel(a);
              const gap = latestChrome - a.major;
              return `<tr>
                <td>${a.app_name}</td>
                <td style="color:#8b949e">${a.app_name.split('/')[0]}</td>
                <td>${a.framework||'?'}</td>
                <td class="ver">${a.chromium_version||'?'}</td>
                <td class="${gap>10?'gap':gap>4?'warn':'ok'}">${gap>0?'-'+gap:'current'}</td>
                <td><span class="badge ${r.cls}">${r.text}</span></td>
                <td style="color:#8b949e">${a.extraction_method||'-'}</td>
              </tr>`;
            }).join('');
          }
          function filter() {
            const q = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('#tbody tr').forEach(tr=>{
              tr.style.display = tr.textContent.toLowerCase().includes(q)?'':'none';
            });
          }
          </script>
          </body>
          </html>
          HTMLEOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: hunter/data

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
